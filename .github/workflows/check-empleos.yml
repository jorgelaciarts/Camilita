name: Revisar empleos de abogado

on:
  schedule:
    # Cada 5 minutos es el intervalo mínimo confiable en GitHub Actions.
    # Poner "*/1" no funciona en la práctica: GitHub igual lo demora/salta.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # permite correrlo manualmente desde la pestaña Actions

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar navegador de Playwright
        run: playwright install --with-deps chromium

      - name: Ejecutar scraper
        run: python scraper.py
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Guardar estado actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "Actualizar ofertas vistas [skip ci]"
          git push
